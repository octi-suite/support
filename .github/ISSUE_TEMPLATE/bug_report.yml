name: 🐛 Bug Report
description: Report a bug or issue
title: "[Bug]: "
labels: ["bug"]
assignees: ["od-martin"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue! Please fill out the form below.

  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which octi suite extension is affected?
      options:
        - OD Local Fonts
        - OD License
        - OD Power of Attorney
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Which version are you using?
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: dropdown
    id: joomla-version
    attributes:
      label: Joomla Version
      options:
        - Joomla 5.x
        - Joomla 4.x
        - Joomla 3.x
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "e.g. 8.2"
    validations:
      required: true

  - type: input
    id: template
    attributes:
      label: Template/Framework
      description: e.g. Helix Ultimate, Cassiopeia, etc.
      placeholder: "Template name"

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the problem clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Screenshots, logs, or other relevant details (optional).